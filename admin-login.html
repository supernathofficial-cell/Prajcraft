<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>PRAJCRAFT | Admin Vault Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .gold-shimmer { background: linear-gradient(90deg, #735c00 0%, #d4af37 50%, #735c00 100%); background-size: 200% auto; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { to { background-position: 200% center; } }
        body { min-height: max(884px, 100dvh); }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#735c00",
                        "primary-fixed-dim": "#e9c349",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary": "#bb152c",
                        "inverse-surface": "#313030",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#474747",
                        "surface-container": "#f0eded",
                        "on-primary": "#ffffff",
                        "surface": "#fcf9f8",
                        "outline": "#7f7663",
                        "outline-variant": "#d0c5af",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3b1",
                        "on-tertiary-fixed-variant": "#92001c",
                        "on-tertiary-container": "#8f001b",
                        "on-surface": "#1c1b1b",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f3f0ef",
                        "primary-container": "#d4af37",
                        "on-secondary-fixed": "#1b1b1b",
                        "on-primary-fixed": "#241a00",
                        "surface-container-high": "#eae7e7",
                        "on-background": "#1c1b1b",
                        "on-primary-container": "#554300",
                        "secondary-fixed-dim": "#c6c6c6",
                        "secondary-container": "#e2e2e2",
                        "inverse-primary": "#e9c349",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#646464",
                        "on-primary-fixed-variant": "#574500",
                        "background": "#fcf9f8",
                        "on-surface-variant": "#4d4635",
                        "surface-tint": "#735c00",
                        "surface-bright": "#fcf9f8",
                        "surface-variant": "#e5e2e1",
                        "surface-container-low": "#f6f3f2",
                        "tertiary-container": "#ff9594",
                        "surface-container-highest": "#e5e2e1",
                        "tertiary-fixed": "#ffdad8",
                        "surface-dim": "#dcd9d9",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#410007",
                        "secondary": "#5e5e5e",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffe088"
                    },
                    "fontFamily": {
                        "headline-md": ["Montserrat"],
                        "display-lg": ["Montserrat"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Montserrat"],
                        "headline-lg": ["Montserrat"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/admin-auth.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col selection:bg-primary selection:text-white">

    <header class="w-full z-50 bg-background/90 backdrop-blur-md border-b border-outline-variant flex justify-between items-center px-4 md:px-8 h-16 shadow-sm absolute top-0 left-0 right-0">
        <div class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform" onclick="window.location.href='index.html'">
            <img alt="Prajcraft Logo" class="h-8 w-auto object-contain" src="assets/images/logo.png"/>
            <span class="font-headline-md text-headline-md font-bold text-primary tracking-tighter">PRAJCRAFT</span>
        </div>
    </header>

    <div class="flex-1 flex w-full pt-16">
        <!-- Image/Brand Section -->
        <div class="hidden lg:flex w-1/2 bg-on-background relative overflow-hidden flex-col justify-end p-12">
            <div class="absolute inset-0">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAdClDz6nBL8klX3MxXngSAwzxPdS0yplTY2mCbBWsjBQceMjJlZRe0BI-JTLW7YqkFpGBXrW9pqtckAPQmZzx5QWqo7mBJWMwGOC5GLGTMSvyi70XDLsE3StcDx-pUbHKIDoxYKETnVVQIjTb2anDN3BaKCYI9ww0BQk0TEhjrob8AmU6SL2CEVAQDOXeiTC2g2v4C3KjE4T7IK6ZNTs_ryZx1_IyXhuqt0UmyN98Zo-YLknmTdopUnqt88s9bmbn_aMaZLi7IH4" onerror="this.src='assets/images/logo.png'" alt="Premium Collectibles" class="w-full h-full object-cover opacity-40 mix-blend-luminosity grayscale">
                <div class="absolute inset-0 bg-gradient-to-t from-on-background via-on-background/50 to-transparent"></div>
            </div>

            <!-- Content -->
            <div class="relative z-10 text-white max-w-lg">
                <span class="px-3 py-1 bg-error-container text-on-error-container text-xs font-bold uppercase tracking-widest rounded mb-6 inline-block">Restricted Access</span>
                <h1 class="font-display-lg text-5xl font-extrabold mb-4 uppercase tracking-tight">Admin Vault</h1>
                <p class="font-body-lg text-secondary-fixed-dim">Master control terminal for inventory management, order fulfillment, and collector relations.</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center bg-surface relative">
            <div class="max-w-md w-full mx-auto p-6 md:p-12">
                
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-surface-container-highest rounded-full flex items-center justify-center mx-auto mb-4 border border-outline-variant shadow-sm text-error">
                        <span class="material-symbols-outlined text-3xl">gpp_maybe</span>
                    </div>
                    <h2 class="font-headline-lg text-3xl text-on-surface uppercase mb-2 tracking-tight">Admin Portal</h2>
                    <p class="font-body-md text-on-surface-variant">Sign in to manage Prajcraft</p>
                </div>

                <div id="errorMessage" class="bg-error-container text-error p-4 rounded text-sm mb-6 font-bold border border-error/20 hidden"></div>

                <form id="adminLoginForm" class="space-y-5">
                    <!-- Email Input -->
                    <div>
                        <label class="block font-label-md text-xs uppercase tracking-widest text-on-surface mb-2">Admin Identity</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">shield_person</span>
                            <input type="email" id="email" placeholder="admin@prajcraft.com" required 
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border border-outline-variant rounded focus:bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none font-body-md text-on-surface placeholder:text-on-surface-variant/50">
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block font-label-md text-xs uppercase tracking-widest text-on-surface">Security Key</label>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
                            <input type="password" id="password" placeholder="••••••••" required 
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border border-outline-variant rounded focus:bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none font-body-md text-on-surface placeholder:text-on-surface-variant/50">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="loginBtn" class="w-full bg-on-background group relative h-14 overflow-hidden rounded shadow-lg active:scale-[0.98] transition-transform mt-4">
                        <div class="absolute inset-0 gold-shimmer opacity-0 group-hover:opacity-10 transition-opacity"></div>
                        <div class="relative z-10 flex items-center justify-center gap-3">
                            <span class="text-white font-label-md uppercase tracking-widest">Authorize Access</span>
                            <span class="material-symbols-outlined text-primary-container">arrow_forward</span>
                        </div>
                    </button>
                </form>

                <div class="mt-8 flex items-center gap-4">
                    <div class="h-px bg-outline-variant flex-1"></div>
                    <span class="font-label-md text-xs text-on-surface-variant uppercase tracking-widest">Admin Gateway</span>
                    <div class="h-px bg-outline-variant flex-1"></div>
                </div>

                <div class="mt-8 flex justify-center gap-8 opacity-70">
                    <div class="flex flex-col items-center gap-1 text-error">
                        <span class="material-symbols-outlined">policy</span>
                        <span class="font-label-md text-[9px] uppercase tracking-widest text-on-surface-variant">Confidential</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');
            
            errorMsg.style.display = 'none';
            errorMsg.classList.add('hidden');
            
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = `<div class="relative z-10 flex items-center justify-center gap-3"><span class="text-white font-label-md uppercase tracking-widest">Authorizing...</span><span class="material-symbols-outlined text-primary-container animate-spin">refresh</span></div>`;
            btn.disabled = true;

            try {
                await adminLogin(email, password);
                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                errorMsg.classList.remove('hidden');
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: userRecord } = await supabase.from('users').select('role').eq('id', session.user.id).single();
                if (userRecord && userRecord.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
